<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing-Rong Tsai</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Bing-Rong Tsai</h1>
        <div class="title">Personal Page</div>

        <div class="time-widget">
            <div class="time-label">Local Time</div>
            <div class="time-display" id="time">--<span class="colon">:</span>--<span class="colon">:</span>--</div>
            <div class="date-display" id="date">Loading...</div>
        </div>

        <div class="footer">
            &copy; <span id="year"></span> Bing-Rong Tsai.
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();

            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const strHours = hours.toString().padStart(2, '0');
            const strMinutes = now.getMinutes().toString().padStart(2, '0');
            const strSeconds = now.getSeconds().toString().padStart(2, '0');

            const timeElement = document.getElementById('time');
            if (timeElement) {
                timeElement.innerHTML = `${strHours}<span class="colon">:</span>${strMinutes}<span class="colon">:</span>${strSeconds} <span style="font-size:0.4em; font-family:'Inter',sans-serif; vertical-align:middle; margin-left:8px; color:var(--text-secondary);">${ampm}</span>`;
            }

            const dateOptions = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const dateElement = document.getElementById('date');
            if (dateElement) {
                dateElement.textContent = now.toLocaleDateString('en-US', dateOptions);
            }

            const yearElement = document.getElementById('year');
            if (yearElement) {
                yearElement.textContent = now.getFullYear();
            }
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
